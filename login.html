<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Login | Lahani</title>
  <link href="assets/styles/style.css" rel="stylesheet" type="text/css" />
  <link href="assets/styles/login_signup.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <nav class="nav">
    <div id="logo-container">
      <img id="go-home" src="img/Lahani Logo.png" />
    </div>
  </nav>

  <div class="content">
    <div id="login-form-container">
      <form id="login-form">
        <h1 style="font-size: 40px;">Login</h1>
        <input type="text" id="username" placeholder="Username" autocomplete="off" />
        <br>
        <input type="password" id="password" placeholder="Password" autocomplete="off" />
        <br>
        <input type="submit" id="submit" value="Login" class="hover-change" />
        <h5 style="text-align: right; margin-right: 30px;"><a href="/signup.html">New? Create an Account!</a></h5>
        <h5 style="text-align: right; margin-right: 30px;"><a href="/fyp.html">Forgot your password?</a></h5>
      </form>
    </div>
  </div>
</body>
<script src="assets/scripts/script.js"></script>
<script src="assets/scripts/login.js"></script>

</html>
